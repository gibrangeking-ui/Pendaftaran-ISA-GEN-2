<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran ISA GEN 2</title>
    <style>
        body { font-family: sans-serif; background-color: #05070a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1a1c24; padding: 25px; border-radius: 15px; width: 100%; max-width: 350px; border: 1px solid #4cc9f0; box-shadow: 0 0 20px rgba(76, 201, 240, 0.2); }
        h2 { text-align: center; color: #4cc9f0; margin-top: 0; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #aaa; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #0b0d17; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4cc9f0; color: #05070a; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #3fa8c9; }
    </style>
</head>
<body>

<div class="card">
    <h2>ISA GEN 2 🚀</h2>
    <p style="text-align: center; font-size: 12px; margin-bottom: 20px;">Indonesia Space Astronomy</p>
    
    <form id="pendaftaranForm">
        <label>Nama Lengkap</label>
        <input type="text" id="inputNama" placeholder="Nama sesuai KTP/Kartu Pelajar" required>

        <label>Status Kehidupan</label>
        <select id="inputStatus" required>
            <option value="">-- Pilih Status --</option>
            <option value="Mahasiswa">Mahasiswa</option>
            <option value="Pelajar">Pelajar</option>
            <option value="Masyarakat">Masyarakat</option>
            <option value="Pekerja">Pekerja</option>
        </select>

        <label>Umur</label>
        <input type="number" id="inputUmur" placeholder="Contoh: 19" required>

        <label>Link TikTok / Media Sosial</label>
        <input type="url" id="inputSosmed" placeholder="https://tiktok.com/@username" required>

        <button type="submit">Kirim Formulir ke Admin</button>
    </form>
</div>

</html>
