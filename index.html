<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISA GEN 2 - Indonesia Space Astronomy</title>
    <style>
        :root {
            --primary: #4cc9f0;
            --secondary: #4361ee;
            --bg: #05070a;
            --card: #11141d;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at center, #1a1c24 0%, #05070a 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(76, 201, 240, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { text-align: center; color: var(--primary); margin-bottom: 5px; letter-spacing: 1px; }
        p.subtitle { text-align: center; font-size: 12px; color: #888; margin-bottom: 25px; }
        
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: #ccc; }
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #0b0d17;
            color: white;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(76, 201, 240, 0.3);
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ISA GEN 2</h2>
    <p class="subtitle">Indonesia Space Astronomy Registration</p>
    
    <form id="formPendaftaran">

        <label>Status Kehidupan</label>
        <select id="status" required>
            <option value="">-- Pilih Status --</option>
            <option value="Mahasiswa">Mahasiswa</option>
            <option value="Pelajar">Pelajar</option>
            <option value="Masyarakat">Masyarakat</option>
            <option value="Pekerja">Pekerja</option>
        </select>

        <label>Umur</label>
        <input type="number" id="umur" placeholder="Contoh: 18" required>

        <label>Link TikTok / Media Sosial</label>
        <input type="url" id="sosmed" placeholder="https://tiktok.com/@user" required>

        <button type="submit" id="btnKirim">Daftar & Masuk Grup Seleksi 🚀</button>
    </form>
</div>

</body>
</html>
